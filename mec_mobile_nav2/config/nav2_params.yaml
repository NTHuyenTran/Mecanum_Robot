# mec_mobile_nav2/config/nav2_params.yaml
/**:
  ros__parameters:
    use_sim_time: true

    # ----------------- AMCL -----------------
    amcl:
      ros__parameters:
        use_sim_time: true
        global_frame_id: "map"
        odom_frame_id: "odom"
        base_frame_id: "base_footprint"
        scan_topic: "/scan"
        set_initial_pose: false
        initial_pose:
          x: 0.0
          y: 0.0
          yaw: 0.0

    # ----------------- BT Navigator -----------------
    bt_navigator:
      ros__parameters:
        use_sim_time: true
        global_frame: map
        robot_base_frame: base_footprint
        odom_topic: /odom
        default_nav_to_pose_bt_xml: ""

    # ----------------- Controller Server (RPP - tốt nhất cho Mecanum) -----------------
    controller_server:
      ros__parameters:
        use_sim_time: true
        controller_frequency: 20.0
        min_x_velocity_threshold: 0.001
        min_y_velocity_threshold: 0.001   # Cho phép di chuyển ngang
        min_theta_velocity_threshold: 0.001

        controller_plugins: ["FollowPath"]

        FollowPath:
          plugin: "nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController"
          desired_linear_vel: 0.6
          max_linear_accel: 3.0
          max_linear_decel: 3.0
          lookahead_dist: 0.6
          min_lookahead_dist: 0.4
          max_lookahead_dist: 1.0
          lookahead_time: 1.5
          use_velocity_scaled_lookahead_dist: true
          min_approach_linear_velocity: 0.03
          max_allowed_time_to_collision_up_to_carrot: 1.0
          use_regulated_linear_velocity_scaling: true
          regulated_linear_scaling_min_radius: 0.9
          regulated_linear_scaling_min_speed: 0.25
          lateral_accel_max: 50.0   # Quan trọng cho Mecanum sideways
          allow_reversing: true

    # ----------------- Planner Server -----------------
    planner_server:
      ros__parameters:
        use_sim_time: true
        planner_plugins: ["GridBased"]
        GridBased:
          plugin: "nav2_navfn_planner/NavfnPlanner"
          tolerance: 0.3
          use_astar: false
          allow_unknown: true

    # ----------------- Local Costmap -----------------
    local_costmap:
      local_costmap:
        ros__parameters:
          update_frequency: 10.0
          publish_frequency: 5.0
          global_frame: odom
          robot_base_frame: base_footprint
          rolling_window: true
          width: 6
          height: 6
          resolution: 0.05
          robot_radius: 0.20
          plugins: ["obstacle_layer", "inflation_layer"]

          obstacle_layer:
            plugin: "nav2_costmap_2d::ObstacleLayer"
            observation_sources: scan depth_camera
            scan:
              topic: /scan
              data_type: LaserScan
              clearing: true
              marking: true
            depth_camera:
              topic: /cam_1/depth/points
              data_type: PointCloud2
              clearing: true
              marking: true
              min_obstacle_height: 0.05
              max_obstacle_height: 2.0

          inflation_layer:
            plugin: "nav2_costmap_2d::InflationLayer"
            inflation_radius: 0.40
            cost_scaling_factor: 3.0

    # ----------------- Global Costmap -----------------
    global_costmap:
      global_mcostmap:
        ros__parameters:
          update_frequency: 2.0
          publish_frequency: 2.0
          global_frame: map
          robot_base_frame: base_footprint
          resolution: 0.05
          robot_radius: 0.20
          plugins: ["static_layer", "obstacle_layer", "inflation_layer"]
          static_layer:
            plugin: "nav2_costmap_2d::StaticLayer"