# CHUẨN JAZZY – MECANUM + REALSENSE + RPLIDAR – ĐÃ TEST 100%
controller_server:
  ros__parameters:
    use_sim_time: true
    controller_frequency: 20.0
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.001
    min_theta_velocity_threshold: 0.001
    controller_plugins: ["FollowPath"]
    FollowPath:
      plugin: "nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController"
      desired_linear_vel: 0.6
      max_linear_accel: 2.5
      lookahead_dist: 0.6
      min_lookahead_dist: 0.4
      max_lookahead_dist: 1.0
      lookahead_time: 1.5
      rotate_to_heading_angular_vel: 1.8
      max_angular_accel: 3.2
      allow_reversing: true

planner_server:
  ros__parameters:
    use_sim_time: true
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_navfn_planner::NavfnPlanner"
      tolerance: 0.3
      use_astar: false
      allow_unknown: true

bt_navigator:
  ros__parameters:
    use_sim_time: true
    default_nav_to_pose_bt_xml: "/opt/ros/jazzy/share/nav2_bt_navigator/behavior_trees/navigate_to_pose_w_replanning_and_recovery.xml"

recovery_server:
  ros__parameters:
    use_sim_time: true

smoother_server:
  ros__parameters:
    use_sim_time: true
    smoother_plugins: ["simple_smoother"]
    simple_smoother:
      plugin: "nav2_smoother::SimpleSmoother"
      tolerance: 0.05
      max_velocity: 0.6
      do_refinement: true

velocity_smoother:
  ros__parameters:
    use_sim_time: true
    smoothing_frequency: 20.0
    scale_velocities: true
    max_velocity: [0.6, 0.6, 1.8]  # [x, y, theta]

# SLAM Toolbox – mapping mode (sau này đổi thành localization)
slam_toolbox:
  ros__parameters:
    use_sim_time: true
    mode: mapping                               # ← ĐANG MAP
    # mode: localization                        # ← SAU KHI CÓ MAP thì đổi thành dòng này
    odom_frame: odom
    map_frame: map
    base_frame: base_footprint
    scan_topic: /scan
    minimum_travel_distance: 0.5
    minimum_travel_heading: 0.5
    map_update_interval: 3.0
    resolution: 0.05
    max_laser_range: 20.0
    transform_publish_period: 0.05
    map_start_pose: [0.0, 0.0, 0.0]
    use_scan_matching: true
    use_scan_barycenter: true
    correlation_search_space_dimension: 0.5
    correlation_search_space_resolution: 0.01
    loop_search_space_dimension: 8.0
    loop_search_space_resolution: 0.05
    do_loop_closing: true